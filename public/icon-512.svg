<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#f0fdf4"/>
  
  <!-- Gradient for depth -->
  <defs>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pole -->
  <rect x="228" y="100" width="56" height="280" fill="url(#poleGrad)" rx="8"/>
  
  <!-- Flag -->
  <path d="M 284 130 Q 370 130 400 170 Q 370 210 284 210 Z" fill="url(#flagGrad)" filter="drop-shadow(4px 4px 8px rgba(0,0,0,0.2))"/>
  
  <!-- Flag outline -->
  <path d="M 284 130 Q 370 130 400 170 Q 370 210 284 210 Z" fill="none" stroke="#15803d" stroke-width="4"/>
  
  <!-- Golf ball -->
  <circle cx="210" cy="340" r="50" fill="white" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Golf ball dimples pattern -->
  <circle cx="190" cy="320" r="4" fill="#cbd5e1"/>
  <circle cx="230" cy="320" r="4" fill="#cbd5e1"/>
  <circle cx="200" cy="360" r="4" fill="#cbd5e1"/>
  <circle cx="220" cy="360" r="4" fill="#cbd5e1"/>
  <circle cx="210" cy="340" r="3" fill="#cbd5e1"/>
  <circle cx="190" cy="340" r="3" fill="#cbd5e1"/>
  <circle cx="230" cy="340" r="3" fill="#cbd5e1"/>
  
  <!-- Shadow -->
  <ellipse cx="256" cy="430" rx="90" ry="20" fill="rgba(0,0,0,0.08)"/>
</svg>

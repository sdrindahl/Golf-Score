<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Transparent background for maskable icon -->
  <defs>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pole -->
  <rect x="86" y="40" width="20" height="110" fill="url(#poleGrad)" rx="4"/>
  
  <!-- Flag -->
  <path d="M 106 50 Q 140 50 150 65 Q 140 80 106 80 Z" fill="url(#flagGrad)"/>
  
  <!-- Flag outline -->
  <path d="M 106 50 Q 140 50 150 65 Q 140 80 106 80 Z" fill="none" stroke="#15803d" stroke-width="2"/>
  
  <!-- Golf ball -->
  <circle cx="80" cy="130" r="20" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Golf ball dimples -->
  <circle cx="72" cy="125" r="1.5" fill="#cbd5e1"/>
  <circle cx="88" cy="125" r="1.5" fill="#cbd5e1"/>
  <circle cx="75" cy="135" r="1.5" fill="#cbd5e1"/>
  <circle cx="85" cy="135" r="1.5" fill="#cbd5e1"/>
  <circle cx="80" cy="140" r="1.5" fill="#cbd5e1"/>
</svg>
